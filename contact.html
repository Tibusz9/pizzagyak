<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat - Pizza Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body onload="initApp()" data-page="contact">
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><h1>🍕 Pizza Paradise</h1></div>
                <ul class="nav-menu">
                    <li><a href="index.html">Főoldal</a></li>
                    <li><a href="gallery.html">Képek</a></li>
                    <li><a href="contact.html">Kapcsolat</a></li>
                    <li><a href="crud.html">CRUD</a></li>
                    <li id="messages-link" style="display:none;"><a href="messages.html">Üzenetek</a></li>
                    <li id="user-info" style="display:none;"></li>
                    <li id="logout-btn" style="display:none;"><a href="#" onclick="logout()" class="btn-logout">Kilépés</a></li>
                    <li id="login-btn"><a href="auth.html" class="btn-login">Bejelentkezés</a></li>
                </ul>
            </div>
        </nav>
    </header>

        <main class="container">
        <h2>Kontakt Form</h2>
        <p>Kérjük, töltse ki az alábbi űrlapot, és hamarosan válaszolunk.</p>
        <form class="form" onsubmit="handleContactSubmit(event)">
            <div id="contact-errors" class="errors" style="display:none;"></div>
            <div id="contact-success" class="success-message" style="display:none;"><h3>✅ Üzenet elküldve!</h3><p>Köszönjük az üzenetét. Hamarosan válaszolunk.</p></div>
            <div class="form-group"><label for="contact-name">Név:</label><input type="text" id="contact-name"></div>
            <div class="form-group"><label for="contact-email">Email:</label><input type="email" id="contact-email"></div>
            <div class="form-group"><label for="contact-subject">Tárgy:</label><input type="text" id="contact-subject"></div>
            <div class="form-group"><label for="contact-message">Üzenet:</label><textarea id="contact-message" rows="6"></textarea></div>
            <button type="submit" class="btn-primary">Küldés</button>
        </form>
    </main>

    <footer><p> 2026 Pizza Paradise.</p></footer>
    <script src="app.js"></script>
</body>
</html>

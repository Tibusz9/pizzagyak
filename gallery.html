<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Képek - Pizza Paradise</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body onload="initApp()" data-page="images">
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><h1>🍕 Pizza Paradise</h1></div>
                <ul class="nav-menu">
                    <li><a href="index.html">Főoldal</a></li>
                    <li><a href="gallery.html">Képek</a></li>
                    <li><a href="contact.html">Kapcsolat</a></li>
                    <li><a href="crud.html">CRUD</a></li>
                    <li id="messages-link" style="display:none;"><a href="messages.html">Üzenetek</a></li>
                    <li id="user-info" style="display:none;"></li>
                    <li id="logout-btn" style="display:none;"><a href="#" onclick="logout()" class="btn-logout">Kilépés</a></li>
                    <li id="login-btn"><a href="auth.html" class="btn-login">Bejelentkezés</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2>Képtár</h2>
        <div id="login-notice" style="margin-bottom:1.5rem;"><p>Képek feltöltéséhez <a href="auth.html" style="color:#667eea;font-weight:600;">jelentkezzen be</a>.</p></div>
        <div id="upload-section" style="display:none;margin-bottom:2rem;background:white;padding:1.5rem;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);">
            <h3>Kép Feltöltése</h3>
            <form onsubmit="handleImageUpload(event)">
                <div class="form-group"><label for="image-input">Válasszon képet:</label><input type="file" id="image-input" accept="image/*" required><small>Támogatott: JPG, PNG, GIF</small></div>
                <button type="submit" class="btn-primary">Feltöltés</button>
            </form>
        </div>
         <div class="grid" id="images-grid"></div>
    </main>

    <footer><p> 2026 Pizza Paradise.</p></footer>
    <script src="app.js"></script>
</body>
</html>

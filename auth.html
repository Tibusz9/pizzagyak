<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejelentkezés - Pizza Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body onload="initApp()" data-page="auth">
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><h1>🍕 Pizza Paradise</h1></div>
                <ul class="nav-menu">
                    <li><a href="index.html">Főoldal</a></li>
                    <li><a href="gallery.html">Képek</a></li>
                    <li><a href="contact.html">Kapcsolat</a></li>
                    <li><a href="crud.html">CRUD</a></li>
                    <li id="messages-link" style="display:none;"><a href="messages.html">Üzenetek</a></li>
                    <li id="user-info" style="display:none;"></li>
                    <li id="logout-btn" style="display:none;"><a href="#" onclick="logout()" class="btn-logout">Kilépés</a></li>
                    <li id="login-btn"><a href="auth.html" class="btn-login">Bejelentkezés</a></li>
                </ul>
            </div>
        </nav>
    </header>

        <main class="container">
        <div class="auth-container">
            <h2>Belépés és Regisztráció</h2>
            

            <div class="tabs">
                <button type="button" class="tab-btn active" onclick="showTab('login')">Bejelentkezés</button>
                <button type="button" class="tab-btn" onclick="showTab('register')">Regisztráció</button>
            </div>

            <div id="login" class="tab-content active">
                <form class="form" onsubmit="handleLogin(event)">
                    <div id="login-errors" class="errors" style="display:none;"></div>
                    <div class="form-group"><label for="login-username">Felhasználónév:</label><input type="text" id="login-username" required></div>
                    <div class="form-group"><label for="login-password">Jelszó:</label><input type="password" id="login-password" required></div>
                    <button type="submit" class="btn-primary">Bejelentkezés</button>
                </form>
            </div>
            <div id="register" class="tab-content">
                <form class="form" onsubmit="handleRegister(event)">
                    <div id="register-errors" class="errors" style="display:none;"></div>
                    <div class="form-group"><label for="reg-username">Felhasználónév:</label><input type="text" id="reg-username" required></div>
                    <div class="form-group"><label for="reg-email">Email:</label><input type="email" id="reg-email" required></div>
                    <div class="form-group"><label for="reg-firstname">Utónév:</label><input type="text" id="reg-firstname" required></div>
                    <div class="form-group"><label for="reg-lastname">Családi név:</label><input type="text" id="reg-lastname" required></div>
                    <div class="form-group"><label for="reg-password">Jelszó:</label><input type="password" id="reg-password" required></div>
                    <div class="form-group"><label for="reg-password-confirm">Jelszó megerősítése:</label><input type="password" id="reg-password-confirm" required></div>
                    <button type="submit" class="btn-primary">Regisztráció</button>
                </form>
            </div>
        </div>
    </main>

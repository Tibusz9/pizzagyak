<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD - Pizza Paradise</title>
    <link rel="stylesheet" href="style.css">
</head>
    <body onload="initApp()" data-page="crud">
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo"><h1>🍕 Pizza Paradise</h1></div>
                <ul class="nav-menu">
                    <li><a href="index.html">Főoldal</a></li>
                    <li><a href="gallery.html">Képek</a></li>
                    <li><a href="contact.html">Kapcsolat</a></li>
                    <li><a href="crud.html">CRUD</a></li>
                    <li id="messages-link" style="display:none;"><a href="messages.html">Üzenetek</a></li>
                    <li id="user-info" style="display:none;"></li>
                    <li id="logout-btn" style="display:none;"><a href="#" onclick="logout()" class="btn-logout">Kilépés</a></li>
                    <li id="login-btn"><a href="auth.html" class="btn-login">Bejelentkezés</a></li>
                </ul>
            </div>
        </nav>
    </header>

        <main class="container crud-page">
        <section class="crud-header">
            <div>
                <h2>Pizza CRUD Alkalmazás</h2>
                <p>Új pizzák rögzítése, módosítása és törlése adatbázisból.</p>
            </div>
            <button onclick="showCrudForm()" class="btn-primary crud-add-btn">Új Pizza</button>
        </section>
            <section id="crud-form" class="crud-form-card" style="display:none;">
            <form class="crud-form" onsubmit="handlePizzaSubmit(event)">
                <h3>Pizza hozzáadása / szerkesztése</h3>
                <input type="hidden" id="pizza-id">
                <div class="form-group"><label for="pizza-name">Pizza neve:</label><input type="text" id="pizza-name" required></div>
                <div class="form-group"><label for="pizza-category">Kategória:</label><select id="pizza-category" required><option value="">-- Válasszon --</option><option value="apród">apród - 850 Ft</option><option value="lovag">lovag - 1150 Ft</option><option value="király">király - 1250 Ft</option><option value="főnemes">főnemes - 950 Ft</option></select></div>
                <div class="form-group crud-checkbox"><label><input type="checkbox" id="pizza-vego"> Vegetáriánus</label></div>
                <div class="crud-form-actions">
                    <button type="submit" class="btn-primary">Mentés</button>
                    <button type="button" onclick="hideCrudForm()" class="btn-secondary">Mégse</button>
                </div>
            </form>
        </section>
